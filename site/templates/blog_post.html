{% extends "base.html" %}

{% block title -%}
    {{ post.title }}
{%- endblock title %}

{% block content %}
    <article class="page__article">
        <hgroup class="page__intro">
            <h1 class="page__title">{{ post.title }}</h1>
            {% if post.date %}
                <p class="page__subtitle">
                    <time datetime="{{ post.date.isoformat() }}">{{ post.date.strftime("%Y-%m-%d") }}</time>
                </p>
            {% endif %}
        </hgroup>
        {{ post.content | safe }}
    </article>
{% endblock content %}
