{% extends "base.html" %}

{% block title -%}
    {{ post.title }}
{%- endblock title %}

{% block content %}
    <article>
        <hgroup>
            <h1>{{ post.title }}</h1>
            {% if post.date %}
                <p>
                    <time datetime="{{ post.date.isoformat() }}">{{ post.date.strftime("%Y-%m-%d") }}</time>
                </p>
            {% endif %}
        </hgroup>
        {{ post.content | safe }}
    </article>
{% endblock content %}
